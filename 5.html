
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Liquid Archive</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:black;
font-family:Inter,sans-serif;
}

canvas{
display:block;
}

.overlay{
position:fixed;
top:20px;
left:20px;
z-index:10;
color:white;
pointer-events:none;
}

.overlay h1{
font-size:14px;
letter-spacing:.25em;
font-weight:900;
margin-bottom:5px;
}

.overlay p{
font-size:11px;
opacity:.7;
letter-spacing:.15em;
}

.footer{
position:fixed;
bottom:20px;
left:20px;
font-size:11px;
letter-spacing:.15em;
color:white;
opacity:.5;
z-index:10;
pointer-events:none;
}

#panel{
position:fixed;
right:20px;
top:20px;
width:320px;
background:rgba(0,0,0,.9);
border:1px solid rgba(255,255,255,.2);
padding:20px;
color:white;
display:none;
z-index:100;
backdrop-filter:blur(10px);
}

#panel h2{
font-size:20px;
margin-bottom:10px;
letter-spacing:.08em;
}

#panel p{
font-size:13px;
opacity:.7;
margin-bottom:15px;
}

.tag{
display:inline-block;
padding:5px 10px;
margin:4px;
border:1px solid rgba(255,255,255,.5);
cursor:pointer;
font-size:11px;
letter-spacing:.08em;
transition:.25s;
}

.tag:hover{
background:white;
color:black;
}

.close{
margin-top:20px;
font-size:11px;
opacity:.5;
}

</style>
</head>
<body>

<div class="overlay">
<h1>LIQUID ARCHIVE</h1>
<p>metadata drifting through space</p>
</div>

<div class="footer">
hover • click • filter by tags • ESC to reset
</div>

<div id="panel">
<h2 id="title"></h2>
<p id="year"></p>
<div id="tags"></div>
<div class="close">ESC to close</div>
</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

const scene = new THREE.Scene();

const cameraTarget =
new THREE.Vector3(
0,
0,
35
);

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 35;

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.setPixelRatio(
window.devicePixelRatio
);

document.body.appendChild(
renderer.domElement
);

const words = [
"ARCHIVE",
"MEMORY",
"LIST",
"DOCUMENT",
"ABSENCE",
"RECONSTRUCTION",
"ERT",
"METADATA",
"SIGNAL LOST",
"PARTICIPATION",
"NETWORK",
"RECORD",
"VOICE",
"FORGOTTEN",
"CATALOGUE",
"IMAGE",
"FRAGMENT",
"PRESERVATION",
"INDEX",
"RELATION"
];

const ontology = {

ARCHIVE:[
"DOCUMENT",
"CATALOGUE",
"METADATA"
],

MEMORY:[
"VOICE",
"FORGOTTEN",
"FRAGMENT"
],

NETWORK:[
"PARTICIPATION",
"RELATION",
"RECORD"
],

RECONSTRUCTION:[
"ABSENCE",
"SIGNAL LOST",
"IMAGE"
]

};

const concepts =
Object.keys(ontology);

const clusterCenters = {

ARCHIVE:
new THREE.Vector3(-25,15,0),

MEMORY:
new THREE.Vector3(25,15,0),

NETWORK:
new THREE.Vector3(-25,-15,0),

RECONSTRUCTION:
new THREE.Vector3(25,-15,0)

};

function createWordTexture(text){

const canvas =
document.createElement("canvas");

const ctx =
canvas.getContext("2d");

canvas.width = 1024;
canvas.height = 256;

ctx.fillStyle = "black";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle = "white";

ctx.font =
"bold 100px Arial";

ctx.textAlign = "center";
ctx.textBaseline = "middle";

ctx.fillText(
text,
canvas.width/2,
canvas.height/2
);

return new THREE.CanvasTexture(
canvas
);

}

const fragments = [];

for(let i=0;i<80;i++){

const concept =
concepts[
Math.floor(
Math.random()*concepts.length
)
];

const archiveItem = {

title:
words[
Math.floor(
Math.random()*words.length
)
],

year:
1970+
Math.floor(
Math.random()*55
),

concept,

tags:[concept]

};

const texture =
createWordTexture(
archiveItem.title
);

const material =
new THREE.MeshBasicMaterial({
map:texture,
transparent:true,
opacity:1
});

const geometry =
new THREE.PlaneGeometry(
8,
2
);

const mesh =
new THREE.Mesh(
geometry,
material
);

mesh.position.x =
(Math.random()-0.5)*80;

mesh.position.y =
(Math.random()-0.5)*60;

mesh.position.z =
(Math.random()-0.5)*80;

mesh.rotation.y =
Math.random()*Math.PI;

mesh.userData.archive =
archiveItem;

mesh.userData.speed =
Math.random()*0.005+0.001;

mesh.userData.float =
Math.random()*10;

mesh.userData.target =
mesh.position.clone();

mesh.userData.home =
mesh.position.clone();

mesh.userData.concept =
concept;

scene.add(mesh);

fragments.push(mesh);

}

const raycaster =
new THREE.Raycaster();

const pointer =
new THREE.Vector2();

const mouse = {
x:0,
y:0
};

let hovered = null;
let selected = null;

window.addEventListener(
"mousemove",
e=>{

mouse.x =
(e.clientX/window.innerWidth)-0.5;

mouse.y =
(e.clientY/window.innerHeight)-0.5;

pointer.x =
(e.clientX/window.innerWidth)*2-1;

pointer.y =
-(e.clientY/window.innerHeight)*2+1;

}
);

window.addEventListener(
"click",
()=>{

raycaster.setFromCamera(
pointer,
camera
);

const hits =
raycaster.intersectObjects(
fragments
);

if(hits.length){

selectFragment(
hits[0].object
);

}

}
);

function selectFragment(mesh){

selected = mesh;

const data =
mesh.userData.archive;

document.getElementById(
"title"
).innerText =
data.title;

document.getElementById(
"year"
).innerText =
"Year: "+data.year;

const tagContainer =
document.getElementById(
"tags"
);

tagContainer.innerHTML = "";

data.tags.forEach(tag=>{

const el =
document.createElement("span");

el.className =
"tag";

el.innerText =
tag;

el.onclick =
()=>filterByTag(tag);

tagContainer.appendChild(
el
);

});

document.getElementById(
"panel"
).style.display =
"block";

}

function filterByTag(tag){

fragments.forEach(f=>{

const match =
f.userData.archive.tags.includes(
tag
);

f.material.opacity =
match ? 1 : 0.08;

});

}

function resetArchive(){

selected = null;

fragments.forEach(f=>{

f.material.opacity = 1;

f.scale.set(
1,
1,
1
);

});

document.getElementById(
"panel"
).style.display =
"none";

}

window.addEventListener(
"keydown",
e=>{

if(e.key==="Escape"){

resetArchive();

}

}
);

const clock =
new THREE.Clock();

function animate(){

requestAnimationFrame(
animate
);

const t =
clock.getElapsedTime();

raycaster.setFromCamera(
pointer,
camera
);

const hits =
raycaster.intersectObjects(
fragments
);

if(hits.length){

if(
hovered !== hits[0].object
){

if(
hovered &&
hovered !== selected
){

hovered.scale.lerp(
new THREE.Vector3(
1,
1,
1
),
0.2
);

}

hovered =
hits[0].object;

}

}else{

hovered = null;

}

fragments.forEach((f,i)=>{

f.lookAt(
camera.position
);

f.rotation.z +=
f.userData.speed;

f.position.y +=
Math.sin(
t+f.userData.float
)*0.003;

f.position.x +=
Math.cos(
t*0.5+i
)*0.002;

let targetScale = 1;

if(f === hovered)
targetScale = 1.3;

if(f === selected)
targetScale = 2;

f.scale.lerp(
new THREE.Vector3(
targetScale,
targetScale,
targetScale
),
0.08
);

if(selected){

if(f !== selected){

f.material.opacity =
Math.max(
f.material.opacity,
0.15
);

}

}

});

camera.position.x =
mouse.x*15;

camera.position.y =
-mouse.y*8;

camera.lookAt(
scene.position
);

renderer.render(
scene,
camera
);

}

animate();

window.addEventListener(
"resize",
()=>{

camera.aspect =
window.innerWidth/
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script>

</body>
</html>
