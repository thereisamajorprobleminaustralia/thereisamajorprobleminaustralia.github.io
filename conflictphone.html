<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fragmented Testimony Archive (Mobile)</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: 'Inter', sans-serif;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

#layers {
  position: absolute;
  width: 100%;
  height: 100%;
}

.fragment {
  position: absolute;
  max-width: min(80vw, 420px);
  font-size: clamp(14px, 4vw, 20px);
  line-height: 1.6;
  opacity: 0.2;
  transition: opacity 0.3s, transform 0.4s;
  filter: blur(1px);
  touch-action: manipulation;
}

.fragment.active {
  opacity: 1;
  filter: blur(0px);
  transform: scale(1.05);
}

.fragment.refusal {
  opacity: 0.05;
  filter: blur(3px);
  text-decoration: line-through;
}

.meta {
  position: absolute;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  opacity: 0.4;
}

#meta1 { top: 20px; left: 20px; }
#meta2 { bottom: 20px; right: 20px; text-align:right; }

#agent {
  position: absolute;
  top: 20px;
  right: 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  opacity: 0.5;
  text-align: right;
}

#log {
  position: absolute;
  bottom: 120px;
  left: 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  opacity: 0.4;
  max-width: 80vw;
}

#mode {
  position: absolute;
  top: 20px;
  left: 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  opacity: 0.7;
}

#panel {
  position: absolute;
  bottom: 20px;
  left: 20px;
  right: 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 10px;
  opacity: 0;
  transition: opacity 0.3s;
  white-space: pre-wrap;
}

#warning {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 11px;
  opacity: 0.3;
}
</style>
</head>

<body>

<canvas id="gl"></canvas>
<div id="layers"></div>

<div id="mode">MODE: CONFLICTED (tap to toggle)</div>

<div id="meta1" class="meta">ARCHIVAL FRACTURE SYSTEM</div>
<div id="meta2" class="meta">STATUS: MOBILE ADAPTIVE</div>

<div id="agent">AGENT: USER<br>ACTIONS: <span id="count">0</span></div>

<div id="log">SYSTEM LOG:<br></div>

<div id="panel"></div>

<div id="warning">tap = stabilize · second tap = archive view · mode toggles ontology</div>

<script>
let mode = "conflicted";
let actions = 0;
let audioUnlocked = false;

const fragments = [
"Η μαρτυρία δεν είναι σταθερή αφήγηση αλλά διαδικασία παραγωγής ορατότητας.",
"Το σώμα λειτουργεί ως αρχείο εξουσίας και εμπειρίας ταυτόχρονα.",
"Η εμπειρία δεν προηγείται της καταγραφής — συγκροτείται μέσα της.",
"Το αρχείο δεν αποθηκεύει απλώς — επιλέγει τι μπορεί να υπάρξει.",
"Η αλήθεια εμφανίζεται ως αποτέλεσμα επιτέλεσης και όχι αναπαράστασης.",
"Οι θεσμοί καθορίζουν τα όρια του βιώσιμου λόγου.",
"Η μαρτυρία είναι χωρική, κινητική, κατακερματισμένη."
];

const container = document.getElementById("layers");
const log = document.getElementById("log");
const countEl = document.getElementById("count");
const panel = document.getElementById("panel");

function register(action){
  actions++;
  countEl.innerText = actions;
  const time = new Date().toLocaleTimeString();
  log.innerHTML = `[${time}] ${action}<br>` + log.innerHTML;
}

function speak(text){
  if(!audioUnlocked) return;
  if(!window.speechSynthesis) return;

  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "el-GR";
  u.rate = 0.9;
  u.pitch = 0.85;
  window.speechSynthesis.speak(u);
}

document.addEventListener("pointerdown", () => {
  audioUnlocked = true;
}, { once: true });

function toggleMode(){
  mode = (mode === "conflicted") ? "conflicted_refusal" : "conflicted";
  document.getElementById("mode").innerText =
    "MODE: " + mode.toUpperCase() + " (tap to toggle)";
}

document.getElementById("mode").addEventListener("click", toggleMode);

function spawnFragment() {
  const f = document.createElement("div");
  f.className = "fragment";

  const text = fragments[Math.floor(Math.random()*fragments.length)];

  const meta = {
    id: "frag-" + Math.random().toString(36).substring(2,8),
    refusal_probability: Math.random()
  };

  let state = "idle";

  let refused = false;
  if(mode === "conflicted_refusal" && meta.refusal_probability > 0.7){
    refused = true;
    f.classList.add("refusal");
    f.innerText = "[UNARCHIVABLE TESTIMONY]";
  } else {
    f.innerText = text;
  }

  f.style.left = Math.random()*60 + "%";
  f.style.top = Math.random()*70 + "%";
  f.style.transform = `rotate(${(Math.random()-0.5)*8}deg)`;

  function activate(){
    if(refused){
      register("refusal encountered");
      panel.style.opacity = 1;
      panel.innerText = "ID: " + meta.id + "\nSTATUS: SILENCED FRAGMENT";
      return;
    }

    f.classList.add("active");
    register("stabilize → " + meta.id);
    speak(text);

    panel.style.opacity = 1;
    panel.innerText =
      "ID: " + meta.id + "\n" +
      "REGIME: conflicted\n" +
      "STATE: stabilized testimony";
  }

  function deactivate(){
    f.classList.remove("active");
    panel.style.opacity = 0;
    window.speechSynthesis.cancel();
  }

  // MOBILE-FIRST INTERACTION
  f.addEventListener("click", () => {
    if(state === "idle"){
      activate();
      state = "active";
    } else {
      deactivate();
      state = "idle";
    }
  });

  container.appendChild(f);

  register("fragment generated → " + meta.id);

  setTimeout(() => {
    f.style.opacity = 0;
    setTimeout(() => f.remove(), 2000);
  }, 15000);
}

window.addEventListener("click", (e) => {
  if(e.target.classList.contains("fragment")) return;
  spawnFragment();
});

// initial
for(let i=0;i<5;i++) spawnFragment();

/* WEBGL BACKGROUND */
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  gl.viewport(0,0,canvas.width,canvas.height);
}
resize();
window.addEventListener("resize", resize);

const vs = `attribute vec4 p;void main(){gl_Position=p;}`;

const fs = `
precision mediump float;
uniform float t;
uniform vec2 resolution;

void main(){
  vec2 uv = gl_FragCoord.xy / resolution.xy;
  float n = sin(uv.x*10.0 + t)*sin(uv.y*10.0 + t);
  gl_FragColor = vec4(vec3(n*0.1),1.0);
}`;

function sh(src,type){
  const s = gl.createShader(type);
  gl.shaderSource(s,src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, sh(vs, gl.VERTEX_SHADER));
gl.attachShader(prog, sh(fs, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER,
  new Float32Array([-1,-1, 1,-1, -1,1, 1,1]),
  gl.STATIC_DRAW);

const loc = gl.getAttribLocation(prog,"p");
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

const timeLoc = gl.getUniformLocation(prog,"t");
const resLoc = gl.getUniformLocation(prog,"resolution");

function render(t){
  gl.uniform1f(timeLoc, t*0.001);
  gl.uniform2f(resLoc, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(render);
}
render();
</script>

</body>
</html>
