<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Living Archive Installation</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    overflow:hidden;
    font-family:Helvetica, Arial, sans-serif;
}

#layout{
    display:grid;
    grid-template-columns:2fr 1fr;
    grid-template-rows:1fr 160px;
    height:100vh;
}

/* -----------------------
   PROJECTION
------------------------ */

#stage{
    position:relative;
    overflow:hidden;

    display:flex;
    flex-direction:column;
    justify-content:center;

    padding:10vw;

    background:
        radial-gradient(
            circle at center,
            rgba(90,90,90,0.08),
            rgba(0,0,0,1)
        );

    transition:opacity 2s ease;
}

#ghost{
    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:80%;

    font-size:3rem;
    font-weight:200;

    opacity:.04;

    filter:blur(3px);

    pointer-events:none;
}

#title{
    font-size:4rem;
    font-weight:200;
    letter-spacing:.08em;
    margin-bottom:30px;
}

#text{
    font-size:1.8rem;
    line-height:1.7;
    max-width:900px;
    color:#d0d0d0;
}

/* -----------------------
   ARCHIVE
------------------------ */

#archive{
    background:#080808;
    border-left:1px solid #222;
    overflow-y:auto;
    padding:15px;
}

#archive h3{
    font-weight:300;
    letter-spacing:.05em;
}

.note{
    font-size:12px;
    color:#aaa;
    padding:8px;
    border-bottom:1px solid #161616;
}

/* -----------------------
   SYSTEM STREAM
------------------------ */

#stream{
    grid-column:1 / span 2;

    background:#030303;
    border-top:1px solid #222;

    padding:10px;

    color:#666;
    font-size:11px;

    overflow:hidden;
    white-space:nowrap;
}

/* -----------------------
   CONTROL
------------------------ */

#control{
    position:fixed;
    top:15px;
    left:15px;
    z-index:999;

    background:rgba(20,20,20,.8);
    padding:10px;
    border:1px solid #333;
}

button{
    background:#111;
    color:white;
    border:1px solid #444;
    padding:8px;
    cursor:pointer;
}

button:hover{
    background:#222;
}

/* background drift */

@keyframes pulse {
    0% { filter:brightness(1); }
    50% { filter:brightness(1.08); }
    100% { filter:brightness(1); }
}

#stage{
    animation:pulse 20s infinite;
}

</style>
</head>
<body>

<div id="control">
<button onclick="start()">▶ Start</button>
<button onclick="injectActor()">👥 Inject Voice</button>
</div>

<div id="layout">

<div id="stage">

<div id="ghost"></div>

<div id="title">
Living Archive
</div>

<div id="text">
Press Start.
</div>

</div>

<div id="archive">

<h3>Living Archive</h3>

<div id="notes"></div>

</div>

<div id="stream"></div>

</div>

<script>

/* -----------------------
   SCENES
------------------------ */

const scenes = [

{
title:"Ontologies vs Feminist Epistemologies",
text:"Ontologies stabilize meaning. Feminist epistemologies suggest meaning emerges through situated relations and remains unfinished."
},

{
title:"Infrastructure of Classification",
text:"Classification systems shape what can be seen, remembered and legitimized. Categories are infrastructures of power."
},

{
title:"Archives as Social Systems",
text:"Archives do not merely preserve memory. They actively participate in producing memory."
},

{
title:"Post Custodial Networks",
text:"Authority becomes distributed across institutions, communities and technical systems."
},

{
title:"Structural Contradiction",
text:"The desire for stable knowledge collides with the reality of contested interpretation."
}

];

/* -----------------------
   ACTORS
------------------------ */

const actors = [

{
role:"ARCHIVIST",
lines:[
"Metadata preserves institutional memory.",
"Description requires structure.",
"Without classification retrieval collapses."
]
},

{
role:"AUDIENCE",
lines:[
"I remember this differently.",
"This archive feels incomplete.",
"My experience is missing."
]
},

{
role:"ALGORITHM",
lines:[
"Confidence score reduced.",
"Entity relationship unresolved.",
"Classification ambiguity detected."
]
},

{
role:"BROADCASTER",
lines:[
"Original transmission unavailable.",
"Signal loss detected.",
"Partial recording recovered."
]
},

{
role:"RESEARCHER",
lines:[
"Interpretation remains provisional.",
"Context continues to evolve.",
"Knowledge is situated."
]
}

];

/* -----------------------
   DRIFT WORDS
------------------------ */

const drift = [
"remembered",
"contested",
"reframed",
"misremembered",
"reconstructed",
"annotated",
"fragmented",
"questioned"
];

/* -----------------------
   DOM
------------------------ */

const title = document.getElementById("title");
const text = document.getElementById("text");
const notes = document.getElementById("notes");
const stream = document.getElementById("stream");
const ghost = document.getElementById("ghost");
const stage = document.getElementById("stage");

/* -----------------------
   SPEECH
------------------------ */

let voices=[];

function loadVoices(){
    voices=speechSynthesis.getVoices();
}

speechSynthesis.onvoiceschanged=loadVoices;

function speak(text){

    if(!voices.length) return;

    const u=new SpeechSynthesisUtterance(text);

    u.voice=voices[
        Math.floor(Math.random()*voices.length)
    ];

    u.rate=.9;
    u.pitch=.9;

    speechSynthesis.speak(u);
}

/* -----------------------
   ARCHIVE
------------------------ */

function addNote(text){

    const div=document.createElement("div");

    div.className="note";
    div.textContent=text;

    notes.prepend(div);

    while(notes.children.length>100){
        notes.removeChild(notes.lastChild);
    }
}

function log(msg){

    const span=document.createElement("span");

    span.textContent=msg+" | ";

    stream.appendChild(span);

    stream.scrollLeft=stream.scrollWidth;
}

/* -----------------------
   ACTOR INTERRUPTION
------------------------ */

function injectActor(){

    const actor =
        actors[Math.floor(Math.random()*actors.length)];

    const line =
        actor.lines[
            Math.floor(Math.random()*actor.lines.length)
        ];

    addNote(actor.role + ": " + line);

    log(actor.role + " intervened");
}

/* -----------------------
   SCENE RENDER
------------------------ */

let current=0;
let previousText="";

function render(scene){

    stage.style.opacity=0;

    setTimeout(()=>{

        ghost.textContent=previousText;

        title.textContent=scene.title;
        text.textContent=scene.text;

        previousText=scene.text;

        stage.style.opacity=1;

        speak(scene.text);

        addNote(
            scene.title +
            " → " +
            drift[
                Math.floor(Math.random()*drift.length)
            ]
        );

        log("Scene activated: " + scene.title);

    },1500);
}

/* -----------------------
   LOOP
------------------------ */

function cycle(){

    render(scenes[current]);

    current++;

    if(current>=scenes.length){
        current=0;
    }

    if(Math.random()>.4){
        setTimeout(injectActor,6000);
    }

    setTimeout(cycle,25000);
}

/* -----------------------
   START
------------------------ */

function start(){

    speechSynthesis.cancel();

    cycle();

    log("Installation started");
}

setTimeout(loadVoices,1000);

</script>

</body>
</html>
